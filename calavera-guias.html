<script>
  // Diagnóstico visible: si algo falla al cargar, se ve un mensaje en pantalla
  // en vez de quedar la página en blanco sin ninguna pista.
  window.__bootErrors = [];
  function bootError(msg) {
    window.__bootErrors.push(msg);
    var el = document.getElementById('boot-banner');
    if (el) { el.style.display = 'block'; el.textContent = '⚠ ' + window.__bootErrors.join('  |  '); }
  }
  window.addEventListener('error', function (e) {
    bootError((e.filename ? e.filename.split('/').pop() + ': ' : '') + (e.message || 'error desconocido'));
  });

  // Carga React / ReactDOM / Babel con un CDN de respaldo por si el principal falla.
  function loadWithFallback(id, urls, done) {
    var i = 0;
    function next() {
      if (i >= urls.length) { bootError('No se pudo cargar ' + id + ' desde ningún CDN. Revisa tu conexión a internet.'); return; }
      var s = document.createElement('script');
      s.src = urls[i];
      s.onload = done;
      s.onerror = function () { i++; next(); };
      document.head.appendChild(s);
    }
    next();
  }
</script>

<script>

    'https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js'
  ], function () {
    loadWithFallback('ReactDOM', [
      'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
      'https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js'
    ], function () {
      loadWithFallback('Babel', [
        'https://unpkg.com/@babel/standalone/babel.min.js',
        'https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js'
      ], function () {
        // Compila el código de la app con Babel.transform() directamente
        // (más confiable que depender del auto-escaneo de <script type="text/babel">).
        var appScript = document.getElementById('app-code');
        try {
          var transformed = Babel.transform(appScript.textContent, { presets: [["react", { runtime: "classic" }]] }).code;
          var real = document.createElement('script');
          real.text = transformed;
          document.body.appendChild(real);
        } catch (err) {
          bootError('Error al compilar la app: ' + err.message);
        }
      });
    });
  });
</script>

// ---------- localStorage helpers (data lives in this browser/device only) ----------
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const LS_PREFIX = "calavera_guia:";

function lsGetAll() {
  const out = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(LS_PREFIX)) {
      try { out.push(JSON.parse(localStorage.getItem(k))); } catch {}
    }
  }
  return out;
}
function lsSave(guide) {
  try { localStorage.setItem(LS_PREFIX + guide.id, JSON.stringify(guide)); return true; }
  catch { return false; }
}
function lsDelete(id) {
  try { localStorage.removeItem(LS_PREFIX + id); return true; }
  catch { return false; }
}

// ---------- Backup export / import ----------
function exportBackup(guides) {
  const blob = new Blob([JSON.stringify(guides, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `calavera-guias-${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ---------- Image compression ----------
function compressImage(file, maxW = 850, quality = 0.55) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ---------- Voice input hook ----------
function useVoice(onResult) {
  const [listening, setListening] = useState(false);
  const recRef = useRef(null);
  const supported = typeof window !== "undefined" && (window.SpeechRecognition || window.webkitSpeechRecognition);

  const start = useCallback(() => {
    if (!supported) return;
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new SR();
    rec.lang = "es-MX";
    rec.interimResults = false;
    rec.maxAlternatives = 1;
    rec.onresult = (e) => onResult(e.results[0][0].transcript);
    rec.onend = () => setListening(false);
    rec.onerror = () => setListening(false);
    recRef.current = rec;
    rec.start();
    setListening(true);
  }, [onResult, supported]);

  const stop = useCallback(() => { recRef.current && recRef.current.stop(); setListening(false); }, []);
  return { listening, start, stop, supported };
}

function VoiceMicButton({ onResult, small }) {
  const { listening, start, stop, supported } = useVoice(onResult);
  if (!supported) return null;
  return (
    <button type="button" onClick={listening ? stop : start} title={listening ? "Detener dictado" : "Dictar por voz"}
      className={`shrink-0 rounded-xl flex items-center justify-center border-2 transition-all ${small ? "w-11 h-11" : "w-14 h-14"}`}

      {listening ? <IconMicOff size={small ? 18 : 22} className="pulse-anim" /> : <IconMic size={small ? 18 : 22} />}
    </button>
  );
}

// ---------- Motorcycle location diagram ----------
function MotoDiagram({ point, onSetPoint, readOnly = false }) {
  const containerRef = useRef(null);
  const handleClick = (e) => {
    if (readOnly) return;
    const rect = containerRef.current.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 100;
    const y = ((e.clientY - rect.top) / rect.height) * 100;
    onSetPoint({ x: Math.max(2, Math.min(98, x)), y: Math.max(2, Math.min(98, y)) });
  };
  if (readOnly && !(point && point.x != null)) return null;
  return (
    <div>
      <div ref={containerRef} onClick={handleClick}
        className={`relative w-full rounded-xl overflow-hidden ${readOnly ? "" : "cursor-crosshair"}`}
        style={{ background: "#F7F7F8", border: `2px solid ${C.border}` }}>
        <svg viewBox="0 0 400 180" className="w-full h-auto block" style={{ pointerEvents: "none" }}>

            <path d="M85 130 L150 80 L230 80 L278 58" />
            <path d="M150 80 L172 130 L260 130" />
            <path d="M230 80 L246 130" />
            <path d="M150 78 Q192 58 236 78" />
            <path d="M270 38 L300 44" />
            <path d="M278 58 L296 40" />
            <path d="M278 58 L330 130" />
            <rect x="176" y="96" width="56" height="34" rx="7" />
            <path d="M172 128 L108 142" strokeWidth="7" />
          </g>
        </svg>
        {point && point.x != null && (
          <IconMapPin size={30} className="absolute" style={{ left: `${point.x}%`, top: `${point.y}%`, transform: "translate(-50%, -100%)", color: C.red, fill: C.red }} />
        )}

// ---------- Measurement row ----------
function MedicionRow({ m, onChange, onRemove }) {
  const isNumeric = m.tipo === "numerica";
  let resultado = m.resultadoManual;
  if (isNumeric && m.valorMedido !== "" && m.valorMin !== "" && m.valorMax !== "") {
    const v = parseFloat(m.valorMedido), min = parseFloat(m.valorMin), max = parseFloat(m.valorMax);
    if (!isNaN(v) && !isNaN(min) && !isNaN(max)) resultado = v >= min && v <= max ? "funciona" : "reemplazar";
  }
  return (
    <div className="rounded-xl p-4 mb-3" style={{ background: "#F7F7F8", border: `2px solid ${C.border}` }}>
      <div className="flex items-center gap-2 mb-3">
        <input value={m.nombre} onChange={(e) => onChange({ ...m, nombre: e.target.value })}
          placeholder="Ej. Resistencia bobina captora"
          className="flex-1 bg-transparent border-b-2 outline-none py-1 text-base font-bold"
          style={{ borderColor: C.border, color: C.ink }} />
        <VoiceMicButton small onResult={(t) => onChange({ ...m, nombre: m.nombre ? m.nombre + " " + t : t })} />
        <button onClick={onRemove} className="shrink-0" style={{ color: C.red }}><IconTrash size={18} /></button>
      </div>
      <div className="flex gap-2 mb-3">
        {["numerica", "booleana"].map((t) => (
          <button key={t} onClick={() => onChange({ ...m, tipo: t })} className="px-3 py-1.5 rounded-lg text-sm font-bold border-2"
            style={m.tipo === t ? { background: "#FFF3D6", borderColor: C.yellow, color: "#8A6200" } : { borderColor: C.border, color: C.muted }}>
            {t === "numerica" ? "Con valor / rango" : "Pasa o falla"}
          </button>
        ))}
      </div>
      {isNumeric ? (
        <div className="grid grid-cols-4 gap-2">
          <input value={m.valorMin} onChange={(e) => onChange({ ...m, valorMin: e.target.value })} placeholder="Mín"
            className="bg-white border-2 rounded-lg px-2 py-2 text-base text-center font-semibold" style={{ borderColor: C.border, color: C.ink }} />
          <input value={m.valorMax} onChange={(e) => onChange({ ...m, valorMax: e.target.value })} placeholder="Máx"
            className="bg-white border-2 rounded-lg px-2 py-2 text-base text-center font-semibold" style={{ borderColor: C.border, color: C.ink }} />
          <input value={m.unidad} onChange={(e) => onChange({ ...m, unidad: e.target.value })} placeholder="Unidad"
            className="bg-white border-2 rounded-lg px-2 py-2 text-base text-center font-semibold" style={{ borderColor: C.border, color: C.ink }} />
          <input value={m.valorMedido} onChange={(e) => onChange({ ...m, valorMedido: e.target.value })} placeholder="Medido"
            className="border-2 rounded-lg px-2 py-2 text-base text-center font-bold" style={{ borderColor: C.yellow, background: "#FFF9E8", color: "#8A6200" }} />
        </div>
      ) : null}
      <div className="flex items-center justify-between mt-3">
        <span className="text-xs uppercase tracking-wide font-bold" style={{ color: C.muted }}>Resultado</span>
        <div className="flex gap-2">
          <button onClick={() => onChange({ ...m, resultadoManual: "funciona" })} disabled={isNumeric && m.valorMedido !== ""}
            className="flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm font-bold border-2"
            style={resultado === "funciona" ? { background: "#DCFCE7", borderColor: C.green, color: "#15803D" } : { borderColor: C.border, color: C.muted }}>
            <IconCheckCircle size={15} /> Funciona
          </button>
          <button onClick={() => onChange({ ...m, resultadoManual: "reemplazar" })} disabled={isNumeric && m.valorMedido !== ""}
            className="flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm font-bold border-2"
            style={resultado === "reemplazar" ? { background: "#FDE1E3", borderColor: C.red, color: "#B0212B" } : { borderColor: C.border, color: C.muted }}>
            <IconXCircle size={15} /> Reemplazar
          </button>
        </div>
      </div>
    </div>
  );
}

// ---------- Symptom chips ----------
function SintomasEditor({ sintomas, setSintomas }) {
  const [draft, setDraft] = useState("");
  const add = (text) => { const t = text.trim(); if (t) setSintomas([...sintomas, t]); setDraft(""); };
  return (
    <div>
      <div className="flex flex-wrap gap-1.5 mb-3">
        {sintomas.map((s, i) => (
          <span key={i} className="flex items-center gap-1.5 text-sm font-semibold px-3 py-1.5 rounded-full"
            style={{ background: "#FDE1E3", color: "#B0212B", border: `1.5px solid ${C.red}` }}>
            {s}
            <button onClick={() => setSintomas(sintomas.filter((_, idx) => idx !== i))}><IconX size={13} /></button>
          </span>
        ))}
      </div>
      <div className="flex items-center gap-2.5">
        <input value={draft} onChange={(e) => setDraft(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && (e.preventDefault(), add(draft))}
          placeholder="Ej. Falla al arrancar en frío"
          className="flex-1 bg-white border-2 outline-none rounded-xl px-4 py-3 text-base font-medium"
          style={{ borderColor: C.border, color: C.ink }} />
        <VoiceMicButton small onResult={(t) => add(t)} />
        <button onClick={() => add(draft)} className="rounded-xl px-3.5 py-3 font-bold" style={{ background: C.yellow, color: C.ink }}><IconPlus size={18} /></button>
      </div>
    </div>
  );
}

// ---------- Photos ----------
function FotosEditor({ fotos, setFotos }) {
  const [uploading, setUploading] = useState(false);
  const handleFiles = async (files) => {
    setUploading(true);
    const newOnes = [];
    for (const f of Array.from(files)) {
      try { newOnes.push(await compressImage(f)); } catch {}
    }
    setFotos([...fotos, ...newOnes]);
    setUploading(false);
  };
  return (
    <div>
      <div className="grid grid-cols-4 gap-2 mb-1">
        {fotos.map((f, i) => (
          <div key={i} className="relative aspect-square rounded-xl overflow-hidden" style={{ border: `2px solid ${C.border}` }}>
            <img src={f} alt="" className="w-full h-full object-cover" />
            <button onClick={() => setFotos(fotos.filter((_, idx) => idx !== i))} className="absolute top-1 right-1 rounded-full p-1" style={{ background: C.red }}>
              <IconX size={13} color="#fff" />
            </button>
          </div>
        ))}
        <label className="aspect-square rounded-xl border-2 border-dashed flex items-center justify-center cursor-pointer" style={{ borderColor: C.blueBorder, color: C.ink, background: C.blue }}>
          {uploading ? <IconLoader size={20} /> : <IconImagePlus size={20} />}
          <input type="file" accept="image/*" multiple onChange={(e) => { if (e.target.files.length) handleFiles(e.target.files); e.target.value = ""; }} className="hidden" />
        </label>
      </div>
      <p className="text-xs font-medium mt-1.5" style={{ color: C.muted }}>Toca el recuadro para elegir de tu galería o tomar una foto.</p>
    </div>
  );
}

// ---------- Empty guide factory ----------
const emptyGuide = () => ({
  id: uid(), titulo: "", descripcion: "", categoria: "Eléctrico", componente: "", marca: "", modelo: "",
  ubicacion: null,
  motoMarca: "", motoModelo: "", anioDesde: "", anioHasta: "",
  estator: "N/D", regulador: "N/D", transmision: "N/D", distribucion: "N/D", accionamiento: "N/D", alimentacion: "N/D",
  mediciones: [], sintomas: [], fotos: [], createdAt: Date.now(),
});

// ---------- Main App ----------
function App() {
  const [view, setView] = useState("list");
  const [guides, setGuides] = useState([]);
  const [current, setCurrent] = useState(null);
  const [search, setSearch] = useState("");
  const [filter, setFilter] = useState("Todos");
  const [brandFilter, setBrandFilter] = useState("Todas");
  const [saving, setSaving] = useState(false);
  const importInputRef = useRef(null);

  useEffect(() => {
    const loaded = lsGetAll().sort((a, b) => b.createdAt - a.createdAt);
    setGuides(loaded);
  }, []);

  const openNew = () => { setCurrent(emptyGuide()); setView("form"); };
  const openEdit = (g) => { setCurrent(JSON.parse(JSON.stringify(g))); setView("form"); };
  const openDetail = (g) => { setCurrent(g); setView("detail"); };
  const openDuplicate = (g) => {
    const copy = JSON.parse(JSON.stringify(g));
    copy.id = uid();
    copy.titulo = (g.titulo || "") + " (copia)";
    copy.createdAt = Date.now();
    setCurrent(copy);
    setView("form");
  };

  const save = () => {
    if (!current.titulo.trim()) return;
    setSaving(true);
    const ok = lsSave(current);
    setSaving(false);
    if (ok) {
      setGuides((prev) => {
        const others = prev.filter((g) => g.id !== current.id);
        return [current, ...others].sort((a, b) => b.createdAt - a.createdAt);
      });
      setView("list");
    } else {
      alert("No se pudo guardar. Puede que el almacenamiento del navegador esté lleno — intenta borrar guías viejas o quitar fotos.");
    }
  };

  const remove = (g) => { lsDelete(g.id); setGuides((prev) => prev.filter((x) => x.id !== g.id)); setView("list"); };

  const handleImportFile = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const imported = JSON.parse(e.target.result);
        if (!Array.isArray(imported)) throw new Error("bad format");
        imported.forEach((g) => { if (g && g.id) lsSave(g); });
        const loaded = lsGetAll().sort((a, b) => b.createdAt - a.createdAt);
        setGuides(loaded);
        alert(`Se importaron ${imported.length} guía(s).`);
      } catch {
        alert("El archivo no tiene un formato válido de respaldo.");
      }
    };
    reader.readAsText(file);
  };

  const brands = Array.from(new Set(guides.map((g) => (g.motoMarca || "").trim()).filter(Boolean))).sort();

  const filtered = guides.filter((g) => {
    const matchesFilter = filter === "Todos" || g.categoria === filter;
    const matchesBrand = brandFilter === "Todas" || (g.motoMarca || "").trim() === brandFilter;
    const q = search.toLowerCase();
    const matchesSearch = !search || g.titulo.toLowerCase().includes(q) || g.componente.toLowerCase().includes(q) ||
      g.marca.toLowerCase().includes(q) || (g.motoMarca || "").toLowerCase().includes(q) || (g.motoModelo || "").toLowerCase().includes(q) ||
      (g.sintomas || []).some((s) => s.toLowerCase().includes(q));
    return matchesFilter && matchesBrand && matchesSearch;
  });

  return (
    <div className="min-h-screen" style={{ background: C.bg, color: C.ink }}>
      {view === "list" && (
        <ListView loading={false} guides={filtered} search={search} setSearch={setSearch} filter={filter} setFilter={setFilter}
          brands={brands} brandFilter={brandFilter} setBrandFilter={setBrandFilter}
          onNew={openNew} onOpen={openDetail} onExport={() => exportBackup(guides)}
          onImportClick={() => importInputRef.current.click()} />
      )}
      <input ref={importInputRef} type="file" accept=".json,application/json" className="hidden"
        onChange={(e) => { if (e.target.files[0]) handleImportFile(e.target.files[0]); e.target.value = ""; }} />
      {view === "form" && current && <FormView guide={current} setGuide={setCurrent} onCancel={() => setView("list")} onSave={save} saving={saving} />}
      {view === "detail" && current && <DetailView guide={current} onBack={() => setView("list")} onEdit={() => openEdit(current)} onDelete={() => remove(current)} onDuplicate={() => openDuplicate(current)} />}
    </div>
  );
}

                }}>
                🏍️ {b}
              </button>

              </button>
            );
          })
        )}
      </div>
    </div>
  );
}

      </div>

      <div className="fixed bottom-0 left-0 right-0 px-5 py-3" style={{ background: C.bg, borderTop: "1px solid #1f1f1f" }}>
        <div className="max-w-lg mx-auto">
          {!guide.titulo.trim() && (
            <p className="text-center text-xs font-bold mb-2" style={{ color: C.red }}>
              ⚠️ Escribe un título arriba (en "Información general") para poder guardar
            </p>
          )}
          <div className="flex gap-3">
            <button onClick={onCancel} className="flex-1 border-2 rounded-xl py-3.5 text-base font-extrabold" style={{ borderColor: "#333", color: "#9CA3AF" }}>Cancelar</button>
            <button onClick={onSave} disabled={!guide.titulo.trim() || saving}
              className="flex items-center justify-center gap-2 disabled:opacity-40 rounded-xl py-3.5 text-base font-extrabold" style={{ background: C.yellow, color: C.ink, flex: 2 }}>
              {saving ? <IconLoader size={18} /> : <IconSave size={18} />} Guardar guía
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ---------- Detail View ----------
function DetailView({ guide, onBack, onEdit, onDelete, onDuplicate }) {
  const [confirmDelete, setConfirmDelete] = useState(false);
  const resultOf = (m) => {
    const isNumeric = m.tipo === "numerica";
    let r = m.resultadoManual;
    if (isNumeric && m.valorMedido !== "" && m.valorMin !== "" && m.valorMax !== "") {
      const v = parseFloat(m.valorMedido), min = parseFloat(m.valorMin), max = parseFloat(m.valorMax);
      if (!isNaN(v)) r = v >= min && v <= max ? "funciona" : "reemplazar";
    }
    return r;
  };
  const specPills = [
    guide.estator !== "N/D" && `Estátor: ${guide.estator}`,
    guide.regulador !== "N/D" && `Regulador: ${guide.regulador}`,
    guide.transmision !== "N/D" && guide.transmision,
    guide.alimentacion !== "N/D" && guide.alimentacion,
    guide.distribucion !== "N/D" && guide.distribucion,
    guide.accionamiento !== "N/D" && guide.accionamiento,
  ].filter(Boolean);

  return (
    <div className="max-w-lg mx-auto pb-16">
      <div className="px-5 pt-6 pb-3 sticky top-0 z-10 flex items-center justify-between" style={{ background: C.bg }}>
        <button onClick={onBack} style={{ color: "#9CA3AF" }}><IconArrowLeft size={22} /></button>
        <div className="flex gap-4 items-center">
          <button onClick={onDuplicate} className="text-base font-extrabold" style={{ color: C.blueBorder }}>Duplicar</button>
          <button onClick={onEdit} className="text-base font-extrabold" style={{ color: C.yellow }}>Editar</button>
          <button onClick={() => setConfirmDelete(true)} style={{ color: C.red }}><IconTrash size={19} /></button>
        </div>
      </div>

      {confirmDelete && (
        <div className="mx-5 mt-4 rounded-xl p-4" style={{ background: "#FDE1E3", border: `2px solid ${C.red}` }}>
          <p className="text-sm font-bold mb-3" style={{ color: "#7A1620" }}>¿Eliminar esta guía? No se puede deshacer.</p>
          <div className="flex gap-2">
            <button onClick={() => setConfirmDelete(false)} className="flex-1 border-2 rounded-lg py-2 text-sm font-extrabold" style={{ borderColor: "#B0212B", color: "#7A1620" }}>Cancelar</button>
            <button onClick={onDelete} className="flex-1 rounded-lg py-2 text-sm font-extrabold text-white" style={{ background: C.red }}>Eliminar</button>
          </div>
        </div>
      )}

      <div className="px-5 pt-5">
        <Card>
          <div className="flex items-center gap-1.5 mb-1.5">
            {guide.categoria === "Eléctrico" ? <IconZap size={14} style={{ color: "#B0212B" }} /> : <IconWrench size={14} style={{ color: "#B0212B" }} />}
            <span className="text-xs uppercase tracking-wider font-extrabold" style={{ color: C.muted }}>{guide.categoria} · {guide.componente}</span>
          </div>
          <h1 className="font-display text-2xl uppercase tracking-wide font-bold mb-1.5" style={{ color: C.ink }}>{guide.titulo}</h1>
          {guide.descripcion && <p className="text-base font-medium mb-3" style={{ color: "#374151" }}>{guide.descripcion}</p>}
          <div className="flex flex-wrap gap-2">
            {(guide.motoMarca || guide.motoModelo) && (
              <span className="px-3 py-1.5 rounded-full text-sm font-bold" style={{ background: C.blue, color: C.ink }}>
                🏍️ {[guide.motoMarca, guide.motoModelo].filter(Boolean).join(" ")}
                {(guide.anioDesde || guide.anioHasta) && ` · ${guide.anioDesde || "?"}–${guide.anioHasta || "?"}`}
              </span>
            )}
            {specPills.map((p, i) => <span key={i} className="px-3 py-1.5 rounded-full text-sm font-bold" style={{ background: "#FFF3D6", color: "#8A6200" }}>{p}</span>)}
          </div>
        </Card>

        {guide.ubicacion && guide.ubicacion.x != null && (
          <Card icon="📍" title="Ubicación en la moto"><MotoDiagram point={guide.ubicacion} readOnly /></Card>
        )}

        {guide.mediciones.length > 0 && (
          <Card icon="📊" title="Mediciones">
            <div className="space-y-2">
              {guide.mediciones.map((m) => {
                const r = resultOf(m);
                return (
                  <div key={m.id} className="flex items-center justify-between rounded-xl px-4 py-3" style={{ background: "#F7F7F8", border: `2px solid ${C.border}` }}>
                    <div className="min-w-0">
                      <p className="text-base font-bold truncate" style={{ color: C.ink }}>{m.nombre || "(sin nombre)"}</p>
                      {m.tipo === "numerica" && <p className="text-sm font-medium" style={{ color: C.muted }}>Rango {m.valorMin || "?"}–{m.valorMax || "?"} {m.unidad} · Medido: {m.valorMedido || "—"} {m.unidad}</p>}
                    </div>
                    {r === "funciona" && <span className="shrink-0 flex items-center gap-1 text-sm font-extrabold" style={{ color: "#15803D" }}><IconCheckCircle size={15} /> Funciona</span>}
                    {r === "reemplazar" && <span className="shrink-0 flex items-center gap-1 text-sm font-extrabold" style={{ color: "#B0212B" }}><IconXCircle size={15} /> Reemplazar</span>}
                    {!r && <span className="shrink-0 text-sm font-semibold" style={{ color: "#9CA3AF" }}>Sin evaluar</span>}
                  </div>
                );
              })}
            </div>
          </Card>
        )}

        {guide.sintomas.length > 0 && (
          <Card icon="⚠️" title="Síntomas de posible falla">
            <ul className="space-y-2">
              {guide.sintomas.map((s, i) => <li key={i} className="flex items-start gap-2 text-base font-medium" style={{ color: "#374151" }}><span style={{ color: C.red }} className="mt-0.5 font-bold">▸</span>{s}</li>)}
            </ul>
          </Card>
        )}

        {guide.fotos.length > 0 && (
          <Card icon="📷" title="Fotos">
            <div className="grid grid-cols-3 gap-2">
              {guide.fotos.map((f, i) => <img key={i} src={f} alt="" className="aspect-square object-cover rounded-lg" style={{ border: `2px solid ${C.border}` }} />)}
            </div>
          </Card>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
